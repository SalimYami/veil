# ═══════════════════════════════════════════════════
# Veil — Backend Service
# ═══════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: veil-backend-svc
  namespace: veil
  labels:
    app: veil
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: veil
    component: backend
