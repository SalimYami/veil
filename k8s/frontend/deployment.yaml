# ═══════════════════════════════════════════════════
# Veil — Frontend Deployment
# ═══════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veil-frontend
  namespace: veil
  labels:
    app: veil
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: veil
      component: frontend
  template:
    metadata:
      labels:
        app: veil
        component: frontend
    spec:
      containers:
        - name: frontend
          image: veil-frontend:latest # Replace with your registry: ghcr.io/you/veil-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
