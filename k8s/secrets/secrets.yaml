# ═══════════════════════════════════════════════════
# Veil — Secrets (sensitive values)
# ═══════════════════════════════════════════════════
# ⚠️  IMPORTANT: Replace the base64 placeholders below!
#
# Generate base64 values with:
#   echo -n "your-actual-password" | base64
#
# In production, use sealed-secrets or external-secrets-operator
# ═══════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: veil-secrets
  namespace: veil
  labels:
    app: veil
type: Opaque
data:
  # echo -n "changeme" | base64 → Y2hhbmdlbWU=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=

  # echo -n "minioadmin" | base64 → bWluaW9hZG1pbg==
  MINIO_ROOT_USER: bWluaW9hZG1pbg==
  MINIO_ROOT_PASSWORD: bWluaW9hZG1pbg==

  # echo -n "your-jwt-secret" | base64
  VEIL_SECRET_KEY: eW91ci1qd3Qtc2VjcmV0
  VEIL_REFRESH_SECRET_KEY: eW91ci1yZWZyZXNoLXNlY3JldA==

  # echo -n "your-admin-key" | base64
  VEIL_ADMIN_KEY: eW91ci1hZG1pbi1rZXk=
