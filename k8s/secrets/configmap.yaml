# ═══════════════════════════════════════════════════
# Veil — ConfigMap (non-sensitive configuration)
# ═══════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: veil-config
  namespace: veil
  labels:
    app: veil
data:
  # Database
  POSTGRES_DB: "veil"
  POSTGRES_USER: "veil"

  # MinIO
  MINIO_BUCKET: "veil-storage"
  MINIO_REGION: "us-east-1"
  MINIO_ENDPOINT: "veil-postgres-svc:9000"

  # Backend
  VEIL_ALLOWED_ORIGINS: "https://veil.example.com"
  MAX_FILE_SIZE: "104857600"
  MAX_FILES_PER_USER: "1000"

  # Frontend
  NGINX_PORT: "80"
