# ═══════════════════════════════════════════════════
# Veil — MinIO Deployment
# ═══════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veil-minio
  namespace: veil
  labels:
    app: veil
    component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: veil
      component: storage
  template:
    metadata:
      labels:
        app: veil
        component: storage
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: veil-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: veil-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: minio-storage
              mountPath: /data
          healthcheck:
            test:
              ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: veil-minio-pvc
