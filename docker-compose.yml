
services:
  # PostgreSQL Database
  veil-db:
    image: postgres:16-alpine
    container_name: veil-postgres
    environment:
      POSTGRES_USER: veil
      POSTGRES_PASSWORD: veil
      POSTGRES_DB: veil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veil"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  veil-storage:
    image: minio/minio:latest
    container_name: veil-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: veil-backend
    environment:
      - DATABASE_URL=postgresql://veil:veil@veil-db:5432/veil
      - MINIO_ENDPOINT=veil-storage:9000
      - MINIO_EXTERNAL_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=veil-storage
      - MAX_FILE_SIZE=104857600
      - VEIL_ALLOWED_ORIGINS=http://localhost,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      veil-db:
        condition: service_healthy
      veil-storage:
        condition: service_healthy

  # MinIO Setup (CORS & Bucket)
  veil-storage-setup:
    image: minio/mc:latest
    container_name: veil-minio-setup
    depends_on:
      veil-storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://veil-storage:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/veil-storage;
      /usr/bin/mc anonymous set public myminio/veil-storage;
      
      # Set CORS via admin config
      /usr/bin/mc admin config set myminio browser cors_allow_origin=*;
      
      echo 'CORS configuration applied via mc admin config.';
      exit 0;
      "

  # Frontend Web App
  frontend:
    build: ./frontend
    container_name: veil-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
