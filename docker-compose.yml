
# ═══════════════════════════════════════════════════
# VEIL — Docker Compose (Development)
# ═══════════════════════════════════════════════════
# All sensitive values come from .env (gitignored)
# Copy .env.example → .env before first run
# ═══════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ─────────────────────────
  veil-db:
    image: postgres:16-alpine
    container_name: veil-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO Object Storage ────────────────────────
  veil-storage:
    image: minio/minio:latest
    container_name: veil-minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
      MINIO_API_CORS_ALLOW_HEADERS: "*"
      MINIO_API_CORS_ALLOW_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      MINIO_BROWSER: "on"
    ports:
      - "9999:9000"   # API
      - "9998:9001"   # Console Web UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO Setup (Bucket + CORS) ─────────────────
  veil-storage-setup:
    image: minio/mc:latest
    container_name: veil-minio-setup
    depends_on:
      veil-storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://veil-storage:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing --region ${MINIO_REGION} myminio/${MINIO_BUCKET};
      /usr/bin/mc anonymous set public myminio/${MINIO_BUCKET};
      /usr/bin/mc admin config set myminio api cors_allow_origin="http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1";
      /usr/bin/mc admin config set myminio api cors_allow_headers="*";
      /usr/bin/mc admin config set myminio api cors_allow_methods="GET,POST,PUT,DELETE,OPTIONS";
      /usr/bin/mc admin service restart myminio;
      echo 'Bucket ${MINIO_BUCKET} initialized with CORS.';
      exit 0;
      "

  # ── Backend API (FastAPI) ───────────────────────
  backend:
    build: ./backend
    container_name: veil-backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@veil-db:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=veil-storage:9000
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE}
      - VEIL_ALLOWED_ORIGINS=${VEIL_ALLOWED_ORIGINS}
      - VEIL_SECRET_KEY=${VEIL_SECRET_KEY}
      - VEIL_REFRESH_SECRET_KEY=${VEIL_REFRESH_SECRET_KEY}
      - VEIL_ADMIN_KEY=${VEIL_ADMIN_KEY}
    ports:
      - "8000:8000"
    depends_on:
      veil-db:
        condition: service_healthy
      veil-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (Nginx) ────────────────────────────
  frontend:
    build: ./frontend
    container_name: veil-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
