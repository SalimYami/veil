name: CI — Lint, Test & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Backend: Lint + Test + Coverage
  # ─────────────────────────────────────────────
  backend:
    name: 🐍 Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: veil
          POSTGRES_PASSWORD: veil_test
          POSTGRES_DB: veil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://veil:veil_test@localhost:5432/veil_test
      VEIL_SECRET_KEY: test-secret-key-for-ci-only
      VEIL_REFRESH_SECRET_KEY: test-refresh-secret-key-for-ci-only
      VEIL_ADMIN_KEY: test-admin-key-for-ci
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: veil-test
      MINIO_EXTERNAL_ENDPOINT: http://localhost:9000
      VEIL_ALLOWED_ORIGINS: http://localhost,http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio httpx ruff

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Frontend: Lint + Type-check
  # ─────────────────────────────────────────────
  frontend:
    name: ⚛️ Frontend (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Security: Trivy — Docker image scanning
  # ─────────────────────────────────────────────
  trivy:
    name: 🛡️ Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t veil-backend:ci ./backend

      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: veil-backend:ci
          format: sarif
          output: trivy-results-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # Non-blocking for demo; set to 1 for strict

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-backend.sarif
        continue-on-error: true

      - name: Trivy scan — filesystem (dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # Integration: Health check with docker compose
  # ─────────────────────────────────────────────
  integration:
    name: 🔗 Integration (Smoke Test)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=veil
          POSTGRES_PASSWORD=veil_ci_pass
          POSTGRES_DB=veil
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin123
          MINIO_REGION=us-east-1
          MINIO_BUCKET=veil-storage
          MINIO_EXTERNAL_ENDPOINT=http://127.0.0.1:9999
          VEIL_SECRET_KEY=ci-secret-key-that-is-now-32char-long
          VEIL_REFRESH_SECRET_KEY=ci-refresh-secret-key-now-32char!
          VEIL_ADMIN_KEY=ci-admin-key-long-enough
          SALT_HMAC_SECRET=ci-salt-hmac-secret-that-is-32char-long-min
          VEIL_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
          MAX_FILE_SIZE=104857600
          EOF

      - name: Start stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for services
        run: |
          echo "Waiting for backend health..."
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          echo ""
          echo "✅ Backend healthy!"

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Teardown
        if: always()
        run: docker compose down -v
